<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/statewave_icon_dark.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Statewave — Memory infrastructure for AI agents. Trusted context runtime with durable episodes, compiled memories, and ranked retrieval." />
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafbfc" media="(prefers-color-scheme: light)" />

    <!-- Open Graph -->
    <meta property="og:title" content="Statewave — Memory Infrastructure for AI Agents" />
    <meta property="og:description" content="Trusted context runtime for AI agents — durable memory infrastructure with structured episodes, compiled knowledge, ranked retrieval, and token-efficient context assembly." />
    <meta property="og:image" content="https://statewave.ai/og-image.png" />
    <meta property="og:url" content="https://statewave.ai" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Statewave" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Statewave — Memory Infrastructure for AI Agents" />
    <meta name="twitter:description" content="Trusted context runtime for AI agents — durable memory infrastructure with structured episodes, compiled knowledge, ranked retrieval, and token-efficient context assembly." />
    <meta name="twitter:image" content="https://statewave.ai/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Statewave — Memory Infrastructure for AI Agents</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Statewave",
      "applicationCategory": "DeveloperApplication",
      "description": "Trusted context runtime for AI agents — durable memory infrastructure with structured episodes, compiled knowledge, and ranked retrieval.",
      "url": "https://statewave.ai",
      "operatingSystem": "Linux, macOS, Windows (via Docker)",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "license": "https://www.gnu.org/licenses/agpl-3.0.html",
      "codeRepository": "https://github.com/smaramwbc/statewave"
    }
    </script>
    <script>
      // Resolve theme before paint to prevent FOUC
      (function() {
        var mode = localStorage.getItem('statewave-theme-mode') || 'auto';
        var resolved = mode;
        if (mode === 'auto') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
