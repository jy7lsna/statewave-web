<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/statewave_icon_dark.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Baseline metadata for the homepage. The SPA layer in src/lib/seo.tsx
         takes over on route change and re-emits page-specific values. -->
    <title>Statewave — Open-source memory runtime for AI agents</title>
    <meta
      name="description"
      content="Open-source memory runtime for AI agents. Durable, structured context with provenance — so your AI stops forgetting across sessions. Self-hosted on Postgres."
    />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://statewave.ai" />

    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafbfc" media="(prefers-color-scheme: light)" />

    <!-- Open Graph -->
    <meta property="og:title" content="Statewave — Open-source memory runtime for AI agents" />
    <meta
      property="og:description"
      content="Open-source memory runtime for AI agents — durable episodic and semantic memory, ranked retrieval, and token-bounded context bundles for LLM applications."
    />
    <meta property="og:image" content="https://statewave.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Statewave — open-source memory runtime for AI agents"
    />
    <meta property="og:url" content="https://statewave.ai" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Statewave" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Statewave — Open-source memory runtime for AI agents" />
    <meta
      name="twitter:description"
      content="Open-source memory runtime for AI agents — durable episodic and semantic memory, ranked retrieval, and token-bounded context bundles for LLM applications."
    />
    <meta name="twitter:image" content="https://statewave.ai/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Statewave — open-source memory runtime for AI agents"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts CSS asynchronously so it doesn't render-block.
         The 4-round-trip cost to fonts.googleapis.com was ~900ms on Slow 4G
         in Lighthouse and was pinning LCP. With this pattern the document
         paints immediately with system-ui fallback, then `font-display: swap`
         (built into the css2 response) swaps in Inter once the woff2 files
         arrive. <noscript> keeps things working with JS disabled. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Baseline structured data — Organization, WebSite, SoftwareApplication.
         These describe the site itself and are stable across routes, so they
         live in the static document for crawlers that don't execute JS. The
         SPA in src/lib/seo.tsx layers per-page JSON-LD (BreadcrumbList,
         FAQPage) on top with data-seo="managed", and never duplicates these. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Statewave",
      "url": "https://statewave.ai",
      "logo": "https://statewave.ai/statewave_icon_dark.png",
      "sameAs": [
        "https://github.com/smaramwbc/statewave",
        "https://github.com/smaramwbc/statewave-docs"
      ],
      "description": "Open-source memory runtime for AI agents. Durable, structured context with provenance — so your AI stops forgetting across sessions. Self-hosted on Postgres."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Statewave",
      "url": "https://statewave.ai",
      "inLanguage": "en",
      "description": "Open-source memory runtime for AI agents."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Statewave",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Linux, macOS, Windows (via Docker)",
      "description": "Open-source memory runtime for AI agents — durable episodic and semantic memory, ranked retrieval, and token-bounded context bundles for LLM applications.",
      "url": "https://statewave.ai",
      "license": "https://www.apache.org/licenses/LICENSE-2.0",
      "codeRepository": "https://github.com/smaramwbc/statewave",
      "softwareHelp": "https://github.com/smaramwbc/statewave-docs",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <script>
      // Resolve theme before paint to prevent FOUC
      (function() {
        var mode = localStorage.getItem('statewave-theme-mode') || 'auto';
        var resolved = mode;
        if (mode === 'auto') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
