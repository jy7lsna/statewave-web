<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid (right side, decorative) -->
  <g opacity="0.08" fill="#94a3b8">
    <circle cx="750" cy="120" r="1.5"/><circle cx="810" cy="120" r="1.5"/><circle cx="870" cy="120" r="1.5"/><circle cx="930" cy="120" r="1.5"/><circle cx="990" cy="120" r="1.5"/><circle cx="1050" cy="120" r="1.5"/>
    <circle cx="750" cy="180" r="1.5"/><circle cx="810" cy="180" r="1.5"/><circle cx="870" cy="180" r="1.5"/><circle cx="930" cy="180" r="1.5"/><circle cx="990" cy="180" r="1.5"/><circle cx="1050" cy="180" r="1.5"/>
    <circle cx="750" cy="240" r="1.5"/><circle cx="810" cy="240" r="1.5"/><circle cx="870" cy="240" r="1.5"/><circle cx="930" cy="240" r="1.5"/><circle cx="990" cy="240" r="1.5"/><circle cx="1050" cy="240" r="1.5"/>
    <circle cx="750" cy="300" r="1.5"/><circle cx="810" cy="300" r="1.5"/><circle cx="870" cy="300" r="1.5"/><circle cx="930" cy="300" r="1.5"/><circle cx="990" cy="300" r="1.5"/><circle cx="1050" cy="300" r="1.5"/>
    <circle cx="750" cy="360" r="1.5"/><circle cx="810" cy="360" r="1.5"/><circle cx="870" cy="360" r="1.5"/><circle cx="930" cy="360" r="1.5"/><circle cx="990" cy="360" r="1.5"/><circle cx="1050" cy="360" r="1.5"/>
    <circle cx="750" cy="420" r="1.5"/><circle cx="810" cy="420" r="1.5"/><circle cx="870" cy="420" r="1.5"/><circle cx="930" cy="420" r="1.5"/><circle cx="990" cy="420" r="1.5"/><circle cx="1050" cy="420" r="1.5"/>
    <circle cx="750" cy="480" r="1.5"/><circle cx="810" cy="480" r="1.5"/><circle cx="870" cy="480" r="1.5"/><circle cx="930" cy="480" r="1.5"/><circle cx="990" cy="480" r="1.5"/><circle cx="1050" cy="480" r="1.5"/>
  </g>

  <!-- Data flow lines (right side, conceptual) -->
  <g opacity="0.3">
    <rect x="760" y="200" width="80" height="2" rx="1" fill="#06b6d4"/>
    <rect x="860" y="200" width="4" height="2" rx="1" fill="#06b6d4"/>
    <rect x="880" y="200" width="120" height="2" rx="1" fill="#6366f1"/>
    <rect x="1020" y="200" width="4" height="2" rx="1" fill="#6366f1"/>
    <rect x="1040" y="200" width="60" height="2" rx="1" fill="#8b5cf6"/>

    <rect x="800" y="280" width="60" height="2" rx="1" fill="#06b6d4"/>
    <rect x="880" y="280" width="4" height="2" rx="1" fill="#06b6d4"/>
    <rect x="900" y="280" width="100" height="2" rx="1" fill="#6366f1"/>

    <rect x="780" y="360" width="90" height="2" rx="1" fill="#06b6d4"/>
    <rect x="890" y="360" width="4" height="2" rx="1" fill="#06b6d4"/>
    <rect x="910" y="360" width="80" height="2" rx="1" fill="#6366f1"/>
    <rect x="1010" y="360" width="4" height="2" rx="1" fill="#6366f1"/>
    <rect x="1030" y="360" width="50" height="2" rx="1" fill="#8b5cf6"/>

    <rect x="820" y="440" width="70" height="2" rx="1" fill="#06b6d4"/>
    <rect x="910" y="440" width="4" height="2" rx="1" fill="#06b6d4"/>
    <rect x="930" y="440" width="90" height="2" rx="1" fill="#6366f1"/>
  </g>

  <!-- Small node dots on the flow lines -->
  <g>
    <circle cx="760" cy="201" r="4" fill="#06b6d4" opacity="0.5"/>
    <circle cx="1100" cy="201" r="4" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="800" cy="281" r="4" fill="#06b6d4" opacity="0.5"/>
    <circle cx="1000" cy="281" r="4" fill="#6366f1" opacity="0.5"/>
    <circle cx="780" cy="361" r="4" fill="#06b6d4" opacity="0.5"/>
    <circle cx="1080" cy="361" r="4" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="820" cy="441" r="4" fill="#06b6d4" opacity="0.5"/>
    <circle cx="1020" cy="441" r="4" fill="#6366f1" opacity="0.5"/>
  </g>

  <!-- Left content area -->
  <!-- Title -->
  <text x="80" y="260" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#f8fafc" letter-spacing="-2">Statewave</text>

  <!-- Accent underline -->
  <rect x="80" y="278" width="100" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#cbd5e1">Trusted context runtime for AI agents</text>

  <!-- Pipeline text -->
  <text x="80" y="400" font-family="ui-monospace, monospace" font-size="15" fill="#64748b">episodes → memories → context → action</text>

  <!-- Bottom bar -->
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#1e293b" stroke-width="1"/>

  <!-- URL -->
  <text x="80" y="612" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#06b6d4">statewave.dev</text>

  <!-- Open source label -->
  <text x="1120" y="612" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#64748b" text-anchor="end">Open Source · Apache-2.0</text>
</svg>
